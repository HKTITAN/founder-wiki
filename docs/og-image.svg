<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect x="0" y="0" width="1200" height="4" fill="#3366cc"/>
  <text x="80" y="180" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#202122">Founder<tspan fill="#3366cc">Wiki</tspan></text>
  <text x="80" y="260" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="28" fill="#54595d">The compiled startup knowledge base</text>
  <line x1="80" y1="290" x2="400" y2="290" stroke="#a7d7f9" stroke-width="2"/>
  <text x="80" y="350" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="22" fill="#202122">YC's entire library — videos, essays, founder interviews</text>
  <text x="80" y="395" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="22" fill="#202122">Compiled into a structured wiki any AI agent can query</text>
  <text x="80" y="440" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="22" fill="#202122">Grounded, cited, and interlinked</text>
  <text x="80" y="510" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="20" fill="#54595d">No RAG. No embeddings. Just markdown and an index.</text>
  <text x="80" y="580" font-family="monospace" font-size="18" fill="#3366cc">founderwiki.co</text>
</svg>
