<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Founder Wiki</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta property="og:title" content="Founder Wiki">
<meta property="og:description" content="Startup knowledge base compiled for AI agents. YC's library of videos, essays, and founder interviews — grounded, cited, and interlinked.">
<meta property="og:image" content="https://founderwiki.co/og-image.png?v=2">
<meta property="og:url" content="https://founderwiki.co">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Founder Wiki">
<meta name="twitter:description" content="Startup knowledge base compiled for AI agents. YC's library of videos, essays, and founder interviews — grounded, cited, and interlinked.">
<meta name="twitter:image" content="https://founderwiki.co/og-image.png?v=2">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: #f6f6f6;
    color: #202122;
    line-height: 1.6;
    font-size: 14px;
  }

  a { color: #36c; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Header — aligned with content width */
  .site-header {
    background: #fff;
    border-bottom: 1px solid #a7d7f9;
    padding: 6px 0;
    display: flex;
    align-items: center;
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .site-header-bg {
    background: #fff;
    border-bottom: 1px solid #a7d7f9;
  }

  .site-logo {
    font-size: 18px;
    font-weight: 700;
    color: #000;
    cursor: pointer;
    font-variant: small-caps;
    letter-spacing: 0.5px;
  }
  .site-logo span { color: #36c; }
  .site-tagline { font-size: 11px; color: #54595d; }
  .site-links { font-size: 11px; color: #72777d; display: flex; gap: 8px; align-items: center; }
  .site-links a { color: #54595d; }
  .site-links a:hover { color: #36c; }

  .search-bar { margin-left: auto; position: relative; }
  .search-bar input {
    padding: 5px 10px;
    border: 1px solid #a2a9b1;
    border-radius: 2px;
    font-size: 13px;
    width: 260px;
  }
  .search-bar input:focus { border-color: #36c; outline: none; }

  .search-results {
    position: absolute; top: 100%; left: 0; right: 0;
    background: #fff; border: 1px solid #a2a9b1; border-top: none;
    max-height: 300px; overflow-y: auto; z-index: 100; display: none;
  }
  .search-results.active { display: block; }
  .search-result-item { padding: 6px 10px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
  .search-result-item:hover { background: #eaf3ff; }
  .search-result-item .sr-title { font-weight: 600; font-size: 13px; }
  .search-result-item .sr-aliases { font-size: 11px; color: #72777d; }

  /* Layout */
  .layout { display: flex; max-width: 1400px; margin: 0 auto; min-height: calc(100vh - 40px); }

  /* Graph view */
  .graph-view {
    flex: 1; background: #fff; border-right: 1px solid #eaecf0; position: relative;
    min-height: calc(100vh - 40px);
  }
  .graph-canvas { width: 100%; height: calc(100vh - 40px); min-height: 620px; background: #fbfbfc; }
  .graph-legend {
    position: absolute; left: 14px; bottom: 14px; background: rgba(255,255,255,0.96);
    border: 1px solid #c8ccd1; border-radius: 4px; padding: 8px 10px; font-size: 11px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06); z-index: 5;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2);
    flex-shrink: 0;
  }

  /* Side panel */
  .panel {
    width: 460px; min-width: 360px; max-width: 520px; background: #fff;
    max-height: calc(100vh - 40px); overflow-y: auto; padding: 20px 28px;
  }
  .panel .home-note {
    background: #f8f9fa; border: 1px solid #a2a9b1; padding: 14px 16px; margin-bottom: 16px;
    font-size: 13px;
  }
  .panel .home-note h2 { margin: 0 0 8px; border: none; font-size: 18px; }

  .panel h1 {
    font-size: 26px; font-weight: 400; border-bottom: 1px solid #a2a9b1;
    padding-bottom: 2px; margin-bottom: 12px; font-family: 'Linux Libertine', Georgia, serif;
  }
  .panel h2 {
    font-size: 19px; font-weight: 400; border-bottom: 1px solid #eaecf0;
    padding-bottom: 2px; margin: 20px 0 8px; font-family: 'Linux Libertine', Georgia, serif;
  }
  .panel h3 { font-size: 15px; font-weight: 600; margin: 14px 0 6px; }
  .panel p { margin-bottom: 10px; }
  .panel ul, .panel ol { margin: 8px 0 12px 24px; }
  .panel li { margin-bottom: 4px; }
  .panel blockquote { border-left: 3px solid #c8ccd1; padding: 4px 12px; margin: 8px 0; color: #54595d; }
  .panel strong { font-weight: 600; }

  /* Images — Wikipedia-style thumbnail */
  .panel img {
    max-width: 220px;
    height: auto;
    border: 1px solid #c8ccd1;
    padding: 2px;
    background: #fff;
  }

  .wiki-thumb {
    float: right;
    clear: right;
    margin: 4px 0 8px 16px;
    max-width: 240px;
    background: #f8f9fa;
    border: 1px solid #c8ccd1;
    padding: 4px;
    font-size: 12px;
  }
  .wiki-thumb.thumb-left {
    float: left;
    margin: 4px 16px 8px 0;
  }
  .wiki-thumb img {
    max-width: 100%;
    height: auto;
    border: none;
    padding: 0;
    margin: 0;
    display: block;
  }
  .wiki-thumb .thumb-caption {
    font-size: 11px;
    color: #54595d;
    padding: 3px 2px 1px;
    line-height: 1.3;
  }

  /* Tables — Wikipedia style */
  .panel table {
    border-collapse: collapse; margin: 12px 0; font-size: 13px; width: 100%;
  }
  .panel th {
    background: #eaecf0; border: 1px solid #a2a9b1; padding: 6px 10px;
    text-align: left; font-weight: 600;
  }
  .panel td {
    border: 1px solid #c8ccd1; padding: 6px 10px; vertical-align: top;
  }
  .panel tr:nth-child(even) td { background: #f8f9fa; }

  /* Article meta line */
  .article-meta-line {
    font-size: 12px; color: #72777d; margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid #eaecf0;
  }
  .article-meta-line .meta-type {
    background: #eaecf0; color: #202122; padding: 1px 6px; border-radius: 2px;
    font-size: 11px; margin-right: 6px;
  }

  /* TOC — Wikipedia style */
  .toc-box {
    background: #f8f9fa; border: 1px solid #a2a9b1; padding: 10px 14px;
    margin: 0 0 16px 0; display: inline-block; min-width: 200px; max-width: 320px;
    font-size: 13px;
  }
  .toc-box .toc-title {
    font-weight: 700; font-size: 13px; text-align: center; margin-bottom: 6px;
  }
  .toc-box ol { margin: 0; padding-left: 20px; }
  .toc-box li { margin: 2px 0; }
  .toc-box a { color: #36c; }

  /* Backlinks section */
  .backlinks {
    background: #f8f9fa; border: 1px solid #eaecf0; padding: 10px 14px;
    margin-top: 20px; font-size: 13px;
  }
  .backlinks h3 { font-size: 13px; margin-bottom: 6px; color: #54595d; border: none; }
  .backlinks a { margin-right: 12px; }

  /* Footnote superscripts */
  .footnote-ref {
    font-size: 0.75em;
    vertical-align: super;
    line-height: 0;
    color: #36c;
    text-decoration: none;
    cursor: pointer;
    font-weight: 600;
  }
  .footnote-ref:hover { text-decoration: underline; }

  @media (max-width: 768px) {
    .layout { flex-direction: column; }
    .graph-view { min-height: 50vh; border-right: none; border-bottom: 1px solid #eaecf0; }
    .graph-canvas { height: 52vh; min-height: 360px; }
    .panel { width: 100%; min-width: 0; max-width: none; max-height: none; }
    .site-links { display: none; }
    .search-bar input { width: 160px; }
  }
</style>
</head>
<body>

<div class="site-header-bg">
<header class="site-header">
  <a class="site-logo" onclick="showHome()">Founder<span>Wiki</span></a>
  <span class="site-tagline">Startup knowledge base compiled for AI agents</span>
  <span class="site-links">
    <a href="https://founderwiki.co" target="_blank" rel="noopener noreferrer" aria-label="Founder Wiki original project site">Original project</a>
    <span aria-hidden="true">·</span>
    <a href="https://github.com/VishalRohra/founder-wiki" target="_blank" rel="noopener noreferrer" aria-label="Founder Wiki GitHub repository">Repository</a>
  </span>
  <div class="search-bar">
    <input type="text" id="search" placeholder="Search founder wiki..." oninput="onSearch(this.value)" onfocus="onSearch(this.value)">
    <div class="search-results" id="searchResults"></div>
  </div>
</header>
</div>

<div class="layout">
  <main class="graph-view">
    <div class="graph-canvas" id="graphCanvas"></div>
    <div class="graph-legend" id="graphLegend"></div>
  </main>
  <aside class="panel" id="panel"></aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
const ARTICLES = {};
const ARTICLE_LIST = [];
const TYPE_COLORS = {
  topic: '#5b8ff9',
  framework: '#f6bd16',
  'case-study': '#61ddaa',
  speaker: '#e8684a',
  industry: '#9263e8',
  other: '#9aa5b1'
};
let graphState = { selected: null };
let lastGraphSize = { width: 0, height: 0 };
const IMAGE_URL_PATTERN = /^https?:\/\/.*\.(png|jpe?g|gif|webp|svg)(\?|#|$)/i;
const GRAPH_RESIZE_THRESHOLD = 8;

function slugify(value) {
  return (value || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

function articleType(article) {
  if (article?.type) {
    const t = article.type.toLowerCase();
    if (t === 'case study') return 'case-study';
    return t;
  }
  if (article?.dir === 'case-studies') return 'case-study';
  if (article?.dir === 'frameworks') return 'framework';
  if (article?.dir === 'speakers') return 'speaker';
  if (article?.dir === 'topics') return 'topic';
  if (article?.dir === 'industries') return 'industry';
  return 'other';
}

// Wikilink handling — supports [[Name]] and [[Slug|Display Name]]
function processWikilinks(html) {
  return html.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, (m, target, display) => {
    const slug = slugify(target);
    return `<a href="#" onclick="navigateTo('${slug}'); return false;">${display}</a>`;
  }).replace(/\[\[([^\]]+)\]\]/g, (m, name) => {
    const slug = slugify(name);
    return `<a href="#" onclick="navigateTo('${slug}'); return false;">${name}</a>`;
  });
}

function extractWikilinkSlugs(body) {
  const links = [];
  const matches = (body || '').matchAll(/\[\[([^\]|]+)(?:\|[^\]]+)?\]\]/g);
  for (const match of matches) {
    const slug = slugify(match[1]);
    if (slug) links.push(slug);
  }
  return links;
}

// Compute backlinks for an article
function getBacklinks(slug) {
  const links = [];
  ARTICLE_LIST.forEach(a => {
    if (a.slug === slug) return;
    const targets = extractWikilinkSlugs(a.body);
    if (targets.includes(slug)) {
      links.push(a);
    }
  });
  return links;
}

async function loadArticles() {
  try {
    const resp = await fetch('articles.json');
    const data = await resp.json();
    data.forEach(a => { ARTICLES[a.slug] = a; ARTICLE_LIST.push(a); });
  } catch(e) { console.error('Failed to load articles.json', e); }
  renderGraph();
  renderGraphLegend();
  showHome();
  handleInitialRoute();
}

function buildGraphData() {
  const nodes = ARTICLE_LIST.map(a => ({
    id: a.slug,
    slug: a.slug,
    title: a.title,
    type: articleType(a),
  }));
  const nodeSet = new Set(nodes.map(n => n.slug));
  const seen = new Set();
  const links = [];
  ARTICLE_LIST.forEach(a => {
    extractWikilinkSlugs(a.body).forEach(target => {
      if (!nodeSet.has(target)) return;
      const key = `${a.slug}::${target}`;
      if (seen.has(key)) return;
      seen.add(key);
      links.push({ source: a.slug, target });
    });
  });
  return { nodes, links };
}

function renderGraphLegend() {
  const legend = document.getElementById('graphLegend');
  const labels = {
    topic: 'Topics',
    framework: 'Frameworks',
    'case-study': 'Case studies',
    speaker: 'People',
    industry: 'Industries',
    other: 'Other'
  };
  legend.innerHTML = Object.entries(TYPE_COLORS).map(([type, color]) => {
    return `<div class="legend-item"><span class="legend-dot" style="background:${color}"></span><span>${labels[type] || type}</span></div>`;
  }).join('');
}

function setActiveNode(slug) {
  graphState.selected = slug || null;
  d3.selectAll('.graph-node')
    .attr('stroke', d => d.slug === graphState.selected ? '#1f2937' : '#fff')
    .attr('stroke-width', d => d.slug === graphState.selected ? 2.5 : 1.2)
    .attr('r', d => d.slug === graphState.selected ? 7 : 5.2);
}

function renderGraph() {
  const container = document.getElementById('graphCanvas');
  if (!container) return;
  const { width, height } = container.getBoundingClientRect();
  lastGraphSize = { width, height };
  container.innerHTML = '';
  const graphData = buildGraphData();

  const svg = d3.select(container)
    .append('svg')
    .attr('width', width)
    .attr('height', Math.max(height, 420))
    .style('display', 'block');

  const g = svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.35, 4]).on('zoom', (event) => g.attr('transform', event.transform)));

  const link = g.append('g')
    .attr('stroke', '#d6dbe1')
    .attr('stroke-opacity', 0.55)
    .selectAll('line')
    .data(graphData.links)
    .join('line')
    .attr('stroke-width', 0.7);

  const node = g.append('g')
    .selectAll('circle')
    .data(graphData.nodes)
    .join('circle')
    .attr('class', 'graph-node')
    .attr('r', 5.2)
    .attr('fill', d => TYPE_COLORS[d.type] || TYPE_COLORS.other)
    .attr('stroke', '#fff')
    .attr('stroke-width', 1.2)
    .style('cursor', 'pointer')
    .on('click', (_, d) => navigateTo(d.slug))
    .call(d3.drag()
      .on('start', (event, d) => {
        if (!event.active) simulation.alphaTarget(0.2).restart();
        d.fx = d.x;
        d.fy = d.y;
      })
      .on('drag', (event, d) => {
        d.fx = event.x;
        d.fy = event.y;
      })
      .on('end', (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
      })
    );

  node.append('title').text(d => `${d.title} (${d.type})`);

  const simulation = d3.forceSimulation(graphData.nodes)
    .force('link', d3.forceLink(graphData.links).id(d => d.id).distance(44).strength(0.2))
    .force('charge', d3.forceManyBody().strength(-28))
    .force('center', d3.forceCenter(width / 2, Math.max(height, 420) / 2))
    .force('collide', d3.forceCollide(6.5))
    .on('tick', () => {
      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
      node
        .attr('cx', d => d.x)
        .attr('cy', d => d.y);
    });

  setActiveNode(graphState.selected);
}

function showHome(fromPopState) {
  if (!fromPopState) {
    history.pushState({}, 'Founder Wiki', '#');
  }
  document.title = 'Founder Wiki';
  graphState.selected = null;
  const panel = document.getElementById('panel');
  const counts = ARTICLE_LIST.reduce((acc, article) => {
    const type = articleType(article);
    acc[type] = (acc[type] || 0) + 1;
    return acc;
  }, {});
  panel.innerHTML = `
    <h1>Founder Wiki</h1>
    <div class="home-note">
      <h2>Graph view</h2>
      <p>Browse the wiki as a knowledge graph. Node colors map to page types, and clicking a node opens the article in this panel.</p>
      <p><strong>${ARTICLE_LIST.length}</strong> pages · ${counts.topic || 0} topics · ${counts.speaker || 0} people · ${counts.framework || 0} frameworks · ${counts['case-study'] || 0} case studies</p>
      <p><a href="https://founderwiki.co" target="_blank" rel="noopener">Original project</a> · <a href="https://github.com/VishalRohra/founder-wiki" target="_blank" rel="noopener">Repository</a></p>
    </div>
  `;
  setActiveNode(null);
}

// Handle initial load from URL hash — works with static hosting
function handleInitialRoute() {
  const hash = window.location.hash.slice(1);
  if (hash && hash !== '' && ARTICLES[hash]) {
    navigateTo(hash);
  }
  // Also check query params for backwards compat
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('article');
  if (slug && ARTICLES[slug]) {
    navigateTo(slug);
    // Rewrite to hash URL
    history.replaceState({ slug }, '', `#${slug}`);
  }
}

function navigateTo(slug, fromPopState) {
  const article = ARTICLES[slug];
  if (!article) { console.warn('Article not found:', slug); return; }

  // Hash-based routing — works with static hosting, persists on reload
  if (!fromPopState) {
    history.pushState({ slug }, article.title, `#${slug}`);
  }
  document.title = `${article.title} — Founder Wiki`;

  // Article meta line
  let metaLine = '<div class="article-meta-line">';
  if (article.type) metaLine += `<span class="meta-type">${article.type}</span>`;
  if (article.speakers_referenced) {
    const speakers = Array.isArray(article.speakers_referenced) ? article.speakers_referenced : [article.speakers_referenced];
    metaLine += `Contributors: ${speakers.join(', ')}`;
  }
  if (article.originated_by) metaLine += `Originated by: ${article.originated_by}`;
  // Last edited timestamp with GitHub version history link
  const lastUpdated = article.last_updated || article.created || '';
  if (lastUpdated) {
    // Construct the GitHub history URL for this article's file
    const filePath = `wiki/${article.dir}/${article.slug}.md`;
    const ghHistoryUrl = `https://github.com/VishalRohra/founder-wiki/commits/main/${filePath}`;
    metaLine += `<span style="float:right; font-size:11px; color:#72777d;">Last edited: <a href="${ghHistoryUrl}" target="_blank" style="color:#72777d;">${lastUpdated}</a></span>`;
  }
  metaLine += '</div>';

  // Build TOC from h2 headers — Wikipedia style
  const h2s = article.body.match(/^## .+$/gm) || [];
  let toc = '';
  if (h2s.length > 1) {
    toc = '<div class="toc-box"><div class="toc-title">Contents</div><ol>';
    h2s.forEach((h, i) => {
      const text = h.replace('## ', '');
      const id = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
      toc += `<li><a href="javascript:void(0)" onclick="document.getElementById('${id}')?.scrollIntoView({behavior:'smooth', block:'start'})">${text}</a></li>`;
    });
    toc += '</ol></div>';
  }

  // Render markdown
  let rendered = marked.parse(article.body);
  rendered = processWikilinks(rendered);

  // Convert [1] footnote markers and fix references section
  // First, find the LAST references section (some articles have duplicates)
  const refsRegex = /<h2[^>]*>References[^<]*<\/h2>/gi;
  let lastRefsMatch = null;
  let refsMatch;
  while ((refsMatch = refsRegex.exec(rendered)) !== null) {
    lastRefsMatch = refsMatch;
  }

  if (lastRefsMatch) {
    const splitIdx = lastRefsMatch.index;
    let body = rendered.substring(0, splitIdx);
    let refsHeader = lastRefsMatch[0];
    let refs = rendered.substring(splitIdx + refsHeader.length);

    // Superscript footnotes in body only
    body = body.replace(/\[(\d+)\]/g, (m, num) => {
      return `<a class="footnote-ref" href="#ref-${num}" onclick="event.preventDefault(); document.getElementById('ref-${num}')?.scrollIntoView({behavior:'smooth', block:'center'})">[${num}]</a>`;
    });

    // Add anchor IDs to reference items — handle all formats:
    // <li>text (ordered list items — marked auto-numbers them)
    // <p>1. text (paragraph format)
    // <li>1. text (explicit numbered list items)
    let refCounter = 0;
    refs = refs.replace(/<li>/g, () => {
      refCounter++;
      return `<li id="ref-${refCounter}">`;
    });
    // Also handle paragraph-formatted refs
    refs = refs.replace(/<p>(\d+)\.\s/g, (m, num) => {
      return `<p id="ref-${num}">${num}. `;
    });

    rendered = body + '<h2 id="references">References</h2>' + refs;
  } else {
    // No References section — still convert footnotes
    rendered = rendered.replace(/\[(\d+)\]/g, (m, num) => {
      return `<a class="footnote-ref" href="#ref-${num}" onclick="event.preventDefault(); document.getElementById('ref-${num}')?.scrollIntoView({behavior:'smooth', block:'center'})">[${num}]</a>`;
    });
  }

  // Add IDs to h2 for TOC linking
  rendered = rendered.replace(/<h2>(.*?)<\/h2>/g, (m, text) => {
    const cleanText = text.replace(/<[^>]+>/g, '');
    const id = cleanText.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    return `<h2 id="${id}">${text}</h2>`;
  });

  // Backlinks
  const backlinks = getBacklinks(slug);
  let blHtml = '';
  if (backlinks.length) {
    blHtml = '<div class="backlinks"><h3>Pages that link here</h3>';
    backlinks.forEach(b => {
      blHtml += `<a href="#" onclick="navigateTo('${b.slug}'); return false;">${b.title}</a>`;
    });
    blHtml += '</div>';
  }

  // Wrap images in Wikipedia-style thumb containers (float right, like Wikipedia)
  function resolveImageSrc(img) {
    const src = img.getAttribute('src') || '';
    if (/^(https?:|data:)/i.test(src)) return src;
    const parent = img.parentElement;
    const linkedHref = parent && parent.tagName === 'A' ? (parent.getAttribute('href') || '') : '';
    const isImageHref = IMAGE_URL_PATTERN.test(linkedHref);
    if (isImageHref) return linkedHref;
    const normalized = src.replace(/^(\.\.\/)+/, '').replace(/^\.\//, '');
    if (normalized.startsWith('raw/')) {
      return `https://raw.githubusercontent.com/VishalRohra/founder-wiki/main/${normalized}`;
    }
    return src;
  }

  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = metaLine + toc + rendered + blHtml;
  function isImageWrappedInLink(image) {
    return Boolean(
      image.parentElement &&
      image.parentElement.tagName === 'A' &&
      image.parentElement.childElementCount === 1 &&
      image.parentElement.firstElementChild === image
    );
  }
  const imgs = tempDiv.querySelectorAll('img');
  imgs.forEach((img) => {
    img.setAttribute('src', resolveImageSrc(img));
    const alt = img.getAttribute('alt') || '';
    const wrapTarget = isImageWrappedInLink(img)
      ? img.parentElement
      : img;
    const wrapper = document.createElement('figure');
    wrapper.className = 'wiki-thumb';
    wrapTarget.parentNode.insertBefore(wrapper, wrapTarget);
    wrapper.appendChild(wrapTarget);
    if (alt) {
      const caption = document.createElement('figcaption');
      caption.className = 'thumb-caption';
      caption.textContent = alt;
      wrapper.appendChild(caption);
    }
  });

  document.getElementById('panel').innerHTML = tempDiv.innerHTML;
  setActiveNode(slug);

  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('search').value = '';
  document.getElementById('panel').scrollTo(0, 0);
}

function onSearch(query) {
  const results = document.getElementById('searchResults');
  if (!query || query.length < 2) { results.classList.remove('active'); return; }

  const q = query.toLowerCase();
  const matches = ARTICLE_LIST.filter(a => {
    if ((a.title || '').toLowerCase().includes(q)) return true;
    const aliases = Array.isArray(a.aliases) ? a.aliases : [];
    if (aliases.some(al => al.toLowerCase().includes(q))) return true;
    // Also search body text
    if ((a.body || '').toLowerCase().includes(q)) return true;
    return false;
  });

  if (!matches.length) { results.classList.remove('active'); return; }

  results.innerHTML = matches.slice(0, 8).map(a => {
    const aliases = Array.isArray(a.aliases) ? a.aliases.slice(0, 4).join(', ') : '';
    return `<div class="search-result-item" onclick="navigateTo('${a.slug}')">
      <div class="sr-title">${a.title}</div>
      <div class="sr-aliases">${aliases}</div>
    </div>`;
  }).join('');
  results.classList.add('active');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-bar')) {
    document.getElementById('searchResults').classList.remove('active');
  }
});

// Browser history support — back/forward buttons work
window.addEventListener('popstate', (e) => {
  if (e.state && e.state.slug) {
    navigateTo(e.state.slug, true);
  } else {
    const hash = window.location.hash.slice(1);
    if (hash && ARTICLES[hash]) {
      navigateTo(hash, true);
    } else {
      showHome(true);
    }
  }
});

// Handle hash changes (from <a href="#slug"> links)
window.addEventListener('hashchange', () => {
  const hash = window.location.hash.slice(1);
  if (hash && ARTICLES[hash]) {
    navigateTo(hash, true);
  } else if (!hash || hash === '') {
    showHome(true);
  }
});

let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const canvas = document.getElementById('graphCanvas');
    if (!canvas) return;
    const { width, height } = canvas.getBoundingClientRect();
    const changed = Math.abs(width - lastGraphSize.width) > GRAPH_RESIZE_THRESHOLD || Math.abs(height - lastGraphSize.height) > GRAPH_RESIZE_THRESHOLD;
    if (changed) renderGraph();
  }, 120);
});

loadArticles();
</script>
